name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r potato/requirements.txt pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Import check
        run: |
          python -c "from potato.risk import RiskValidator; print('risk OK')"
          python -c "from potato.trading.journal import TradeJournal; print('journal OK')"
          python -c "from potato.trading.executor import TradeExecutor; print('executor OK')"
          python -c "from potato.vault import Vault; print('vault OK')"